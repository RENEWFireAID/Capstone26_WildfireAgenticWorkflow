name: Deploy Project to Server

permissions:
    contents: read

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
    deploy:
        runs-on: [self-hosted]
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Create .env file
              run: |
                echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
                echo "ALLOW_INSERT=false" >> .env
                echo "MONGODB_URI=mongodb://root:password@mongo:27018/?authSource=admin" >> .env
                echo "MONGO_INITDB_ROOT_USERNAME=root >> .env
                echo "MONGO_INITDB_ROOT_PASSWORD=9FCBC1FA148CFCFDE320557B5CB73DBB" >> .env
                echo "MCP_HTTP_BASE=http://137.229.25.190:8081" >> .env
                echo "MCP_ALLOWED_HOSTS=137.229.25.190,localhost,0.0.0.0" >> .env
                
            - name: Update fireaid_web Dependancies
              run: |
                cd fireaid_web
                docker build -t fireaid_web_base:latest -f docker/Dockerfile-Base .

            - name: Build and Start Docker Containers
              run: |
                docker compose down
                docker compose build
                docker compose up -d 

            - name: Populate MongoDB with terms.csv
              run: |
                source .env
                mongosh --port 27018 -u $MONGO_INITDB_ROOT_USERNAME \
                  -p $MONGO_INITDB_ROOT_PASSWORD \
                  --eval "use fireaid" \
                  --eval "db.terms.deleteMany({})"

                query=""
                while read line;
                do
                    IFS=',' read -r term def <<< $line
                    query+="{term: \"$term\", def: $def},"
                done < ./scripts/term_scraper/terms.csv

                mongosh --port 27018 -u root -p password \
                  --eval "use fireaid" \
                  --eval "db.terms.insertMany([$query])"

